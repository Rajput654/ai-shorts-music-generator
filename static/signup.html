<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SynthaVerse</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-form { display: flex; flex-direction: column; gap: 1.5rem; }
        .auth-input { width: 100%; }
        .error-msg { color: #f87171; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="background-wrapper">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-user-plus"></i>
                <h1>Syntha<span>Verse</span></h1>
            </div>
            <p class="subtitle">Join the AI Music Revolution</p>
        </header>

        <section class="glass-panel">
            <form id="signup-form" class="auth-form">
                <div class="settings-group">
                    <label>Username</label>
                    <input type="text" id="username" class="auth-input" required placeholder="Choose a username">
                </div>
                <div class="settings-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="auth-input" required placeholder="Enter your email">
                </div>
                <div class="settings-group">
                    <label>Password</label>
                    <input type="password" id="password" class="auth-input" required minlength="6" placeholder="Create a strong password">
                </div>
                <!-- Hidden Admin Backdoor for the creator -->
                <div class="settings-group" style="padding-top:1rem; border-top: 1px dotted rgba(255,255,255,0.2);">
                    <label style="color: rgba(255,255,255,0.4); font-size: 0.8rem;">(Optional) Creator Secret Code</label>
                    <input type="password" id="admin_secret" style="background: rgba(0,0,0,0.1); border-color: rgba(255,255,255,0.1);" class="auth-input" placeholder="Enter 'superadmin123' for admin access">
                </div>
                
                <p id="error-message" class="error-msg"></p>
                
                <button type="submit" class="submit-btn" id="signup-btn">
                    <span>Create Account</span>
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </form>
            
            <form id="otp-form" class="auth-form" style="display: none;">
                <h3 style="text-align: center; color: white;">Email Verification</h3>
                <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem;">We sent a 6-digit code to your email.</p>
                <div class="settings-group">
                    <label>OTP Code</label>
                    <input type="text" id="otp" class="auth-input" required maxlength="6" placeholder="123456" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
                </div>
                <p id="otp-error-message" class="error-msg"></p>
                <button type="submit" class="submit-btn" id="otp-btn">
                    <span>Verify Account</span>
                    <i class="fa-solid fa-check-circle"></i>
                </button>
            </form>

            <div style="text-align: center; margin-top: 2rem;">
                <p style="color: var(--text-secondary);">Already have an account? <a href="/login" style="color: var(--accent); text-decoration: none; font-weight: 600;">Log in here</a></p>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            const payload = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                admin_secret: document.getElementById('admin_secret').value || null
            };

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.detail || "Signup failed");
                
                // Show OTP form instead of redirecting
                document.getElementById('signup-form').style.display = 'none';
                document.getElementById('otp-form').style.display = 'flex';
                
            } catch (err) {
                document.getElementById('error-message').innerText = err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Create Account</span><i class="fa-solid fa-wand-magic-sparkles"></i>';
            }
        });

        document.getElementById('otp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('otp-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            const payload = {
                username: document.getElementById('username').value,
                otp: document.getElementById('otp').value
            };

            try {
                const res = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.detail || "Verification failed");
                
                localStorage.setItem('synthaverse_token', data.access_token);
                window.location.href = '/';
            } catch (err) {
                document.getElementById('otp-error-message').innerText = err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Verify Account</span><i class="fa-solid fa-check-circle"></i>';
            }
        });
    </script>
</body>
</html>
